# ===========================================
# Akıllı Sınıf - Mosquitto MQTT Broker Config
# ===========================================

# --- Genel Ayarlar ---
# ⚠ GUVENLIK: 0.0.0.0 + plain MQTT yalnizca GUVENLI BIR LAN'DA kullanilmalidir.
# Router'da port-forward (1883/9001) yaparsan trafik internete acilir ve
# kullanici/sifre cleartext olur. O senaryo icin TLS (8883) zorunludur —
# asagidaki blok ve `gen-certs.sh` rehberine bak.
#
# Bind alternatifleri:
#   0.0.0.0     — tum interface'ler (LAN multi-host, default)
#   127.0.0.1   — sadece localhost (Node-RED ayni makinedeyse en sade)
#   192.168.1.10 — yalnizca bu IP (host birden cok aga bagliysa kisitlama)
listener 1883 0.0.0.0
protocol mqtt

# --- TLS (opsiyonel — LAN disi deploy icin sart) ---
# Sertifika uret:
#   bash server/mosquitto/gen-certs.sh [LAN_IP]
# Sonra:
#   sudo mkdir -p /etc/mosquitto/certs
#   sudo cp server/mosquitto/certs/{ca.crt,server.crt,server.key} /etc/mosquitto/certs/
#   sudo chown mosquitto:mosquitto /etc/mosquitto/certs/*
#   sudo chmod 640 /etc/mosquitto/certs/server.key
# Asagidaki blok yorumdan cikar, mosquitto'yu yeniden baslat.
# Mobil tarafta SetupScreen "TLS / WSS kullan" toggle'ini ac (port 9001 +
# WS-TLS varyanti veya 8883 native MQTT).
#
# listener 8883
# protocol mqtt
# cafile   /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile  /etc/mosquitto/certs/server.key
# require_certificate false   # client-cert auth istersen true

# --- Güvenlik Ayarları ---
# Anonim bağlantıları engelle (authentication zorunlu)
allow_anonymous false

# Şifre dosyasının yolu
password_file /etc/mosquitto/passwd

# Topic-bazli yetkilendirme (esp32 control yazamaz, vs.)
acl_file /etc/mosquitto/acl

# --- Logging Ayarları ---
# Log dosyası konumu
log_dest file /var/log/mosquitto/mosquitto.log

# Hangi olaylar loglanacak (debug için 'all', production için 'error warning')
log_type error
log_type warning
log_type notice
log_type information

# Bağlantı logları
connection_messages true

# Timestamp formatı
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# --- Persistence (Mesaj Saklama) ---
# Sunucu kapansa bile mesajları sakla
persistence true

# Saklama konumu
persistence_location /var/lib/mosquitto/

# Autosave interval (saniye)
autosave_interval 1800

# --- Performans Ayarları ---
# Maksimum bağlantı sayısı (-1 = sınırsız)
max_connections -1

# Mesaj boyutu limiti (bytes) - 1MB
message_size_limit 1048576

# --- WebSocket Desteği (mobil uygulama + web dashboard) ---
listener 9001 0.0.0.0
protocol websockets

# ===========================================
# NOT: Bu dosyayı /etc/mosquitto/ dizinine
# kopyalamanız gerekecek:
# sudo cp mosquitto.conf /etc/mosquitto/mosquitto.conf
# ===========================================
