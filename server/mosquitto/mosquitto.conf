# ===========================================
# Akıllı Sınıf - Mosquitto MQTT Broker Config
# ===========================================

# --- Genel Ayarlar ---
# Dinlenecek port + ag arayuzu.
# 0.0.0.0 = tum interface'ler (LAN + internet — DIKKATLI OL!)
# 127.0.0.1 = sadece localhost (Node-RED ayni makinedeyse en guvenli)
# 192.168.1.10 = sadece bu IP (LAN'da multi-host kurulum)
# Default = 0.0.0.0 (eski davranis); hemen kisitla:
listener 1883 0.0.0.0
# ⚠ INTERNET'E ACIK ROUTER'da port forward varsa: TLS (8883) sart!

# Protokol tipi
protocol mqtt

# --- TLS (uretim icin acik kalmali) ---
# Sertifika uretimi icin: docs/setup-guide.md > "MQTT TLS" bolumune bak
# listener 8883
# protocol mqtt
# cafile   /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile  /etc/mosquitto/certs/server.key
# require_certificate false   # client-cert auth istersen true

# --- Güvenlik Ayarları ---
# Anonim bağlantıları engelle (authentication zorunlu)
allow_anonymous false

# Şifre dosyasının yolu
password_file /etc/mosquitto/passwd

# Topic-bazli yetkilendirme (esp32 control yazamaz, vs.)
acl_file /etc/mosquitto/acl

# --- Logging Ayarları ---
# Log dosyası konumu
log_dest file /var/log/mosquitto/mosquitto.log

# Hangi olaylar loglanacak (debug için 'all', production için 'error warning')
log_type error
log_type warning
log_type notice
log_type information

# Bağlantı logları
connection_messages true

# Timestamp formatı
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# --- Persistence (Mesaj Saklama) ---
# Sunucu kapansa bile mesajları sakla
persistence true

# Saklama konumu
persistence_location /var/lib/mosquitto/

# Autosave interval (saniye)
autosave_interval 1800

# --- Performans Ayarları ---
# Maksimum bağlantı sayısı (-1 = sınırsız)
max_connections -1

# Mesaj boyutu limiti (bytes) - 1MB
message_size_limit 1048576

# --- WebSocket Desteği (opsiyonel, web dashboard için) ---
# listener 9001
# protocol websockets

# ===========================================
# NOT: Bu dosyayı /etc/mosquitto/ dizinine
# kopyalamanız gerekecek:
# sudo cp mosquitto.conf /etc/mosquitto/mosquitto.conf
# ===========================================
