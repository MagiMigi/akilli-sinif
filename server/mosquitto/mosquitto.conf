# ===========================================
# Akıllı Sınıf - Mosquitto MQTT Broker Config
# ===========================================

# --- Genel Ayarlar ---
# Dinlenecek port (standart MQTT portu)
listener 1883

# Protokol tipi
protocol mqtt

# --- Güvenlik Ayarları ---
# Anonim bağlantıları engelle (authentication zorunlu)
allow_anonymous false

# Şifre dosyasının yolu
password_file /etc/mosquitto/passwd

# --- Logging Ayarları ---
# Log dosyası konumu
log_dest file /var/log/mosquitto/mosquitto.log

# Hangi olaylar loglanacak (debug için 'all', production için 'error warning')
log_type error
log_type warning
log_type notice
log_type information

# Bağlantı logları
connection_messages true

# Timestamp formatı
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# --- Persistence (Mesaj Saklama) ---
# Sunucu kapansa bile mesajları sakla
persistence true

# Saklama konumu
persistence_location /var/lib/mosquitto/

# Autosave interval (saniye)
autosave_interval 1800

# --- Performans Ayarları ---
# Maksimum bağlantı sayısı (-1 = sınırsız)
max_connections -1

# Mesaj boyutu limiti (bytes) - 1MB
message_size_limit 1048576

# --- WebSocket Desteği (opsiyonel, web dashboard için) ---
# listener 9001
# protocol websockets

# ===========================================
# NOT: Bu dosyayı /etc/mosquitto/ dizinine
# kopyalamanız gerekecek:
# sudo cp mosquitto.conf /etc/mosquitto/mosquitto.conf
# ===========================================
