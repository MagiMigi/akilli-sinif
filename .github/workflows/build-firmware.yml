name: Build & Release Firmware

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ESP32-PLC
            artifact: firmware-plc
            fqbn: esp32:esp32:esp32
            source: firmware/esp32-plc/src/main/
            version_file: firmware/esp32-plc/VERSION
            libraries: >-
              PubSubClient
              ArduinoJson
              "DHT sensor library"
              TFT_eSPI
              WiFiManager

          - name: ESP32-CAM
            artifact: firmware-cam
            fqbn: esp32:esp32:esp32wrover:PartitionScheme=min_spiffs
            source: firmware/esp32-cam/src/main/
            version_file: firmware/esp32-cam/VERSION
            libraries: >-
              PubSubClient
              ArduinoJson
              WiFiManager

          - name: ESP32-Simulator
            artifact: firmware-sim
            fqbn: esp32:esp32:esp32
            source: firmware/esp32-simulator/src/main/
            version_file: firmware/esp32-simulator/VERSION
            libraries: >-
              PubSubClient
              ArduinoJson
              WiFiManager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 board support (retry on flaky CDN)
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          for i in 1 2 3; do
            arduino-cli core install esp32:esp32 && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done

      - name: Install libraries
        run: arduino-cli lib install ${{ matrix.libraries }}

      - name: Generate firmware/secrets.h from repo secret
        env:
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
        run: |
          if [ -z "$MQTT_PASSWORD" ]; then
            echo "::warning::MQTT_PASSWORD repo secret tanimsiz — secrets.h.example kullanilir (CHANGE_ME placeholder)."
            cp firmware/secrets.h.example firmware/secrets.h
          else
            cat > firmware/secrets.h <<EOF
          #pragma once
          #define MQTT_USER_DEFAULT      "esp32"
          #define MQTT_PASSWORD_DEFAULT  "$MQTT_PASSWORD"
          EOF
            echo "secrets.h CI secret'tan olusturuldu."
          fi

      - name: Apply custom TFT_eSPI User_Setup.h (PLC only)
        if: matrix.name == 'ESP32-PLC'
        run: |
          LIB_DIR="$HOME/Arduino/libraries/TFT_eSPI"
          cp firmware/esp32-plc/User_Setup.h "$LIB_DIR/User_Setup.h"
          grep -E '^#define (ST7735_DRIVER|TFT_RST|TFT_CS)' "$LIB_DIR/User_Setup.h"

      - name: Read firmware version
        id: ver
        run: echo "v=$(cat ${{ matrix.version_file }} | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Update version.h
        run: |
          VER="${{ steps.ver.outputs.v }}"

          cat > firmware/version.h <<EOF
          #ifndef VERSION_H
          #define VERSION_H

          #define FIRMWARE_VERSION "$VER"

          #define BUILD_DATE __DATE__
          #define BUILD_TIME __TIME__

          #endif
          EOF

      - name: Compile
        run: |
          arduino-cli compile \
            --fqbn ${{ matrix.fqbn }} \
            --output-dir ./build \
            ${{ matrix.source }}

      - name: Rename binary
        run: mv ./build/main.ino.bin ./${{ matrix.artifact }}-v${{ steps.ver.outputs.v }}.bin

      - name: Generate MD5 checksum
        run: |
          BIN=${{ matrix.artifact }}-v${{ steps.ver.outputs.v }}.bin
          md5sum "$BIN" | awk '{print $1}' > "$BIN.md5"
          echo "MD5: $(cat $BIN.md5)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}-*
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Collect binaries + checksums
        run: |
          mkdir -p release
          mv firmware-plc/* release/
          mv firmware-cam/* release/
          mv firmware-sim/* release/
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware ${{ github.ref_name }}"
          generate_release_notes: true
          files: release/*
